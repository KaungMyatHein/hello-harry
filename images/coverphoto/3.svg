  <circle cx="130" cy="504" r="10" fill="#1e1a14" stroke="#2a2724" stroke-width="1" opacity="0.4"/>
  <circle cx="130" cy="532" r="10" fill="#1e1a14" stroke="#2a2724" stroke-width="1" opacity="0.3"/>
  <circle cx="130" cy="556" r="8" fill="#1e1a14" stroke="#2a2724" stroke-width="0.8" opacity="0.25"/>
  <circle cx="130" cy="576" r="8" fill="#1e1a14" stroke="#2a2724" stroke-width="0.8" opacity="0.2"/>
</g>

