<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
<defs>
  <radialGradient id="bg3" cx="50%" cy="60%" r="70%">
    <stop offset="0%" stop-color="#2b1d13"/>
    <stop offset="55%" stop-color="#161210"/>
    <stop offset="100%" stop-color="#0d0b09"/>
  </radialGradient>
  <radialGradient id="glow3" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#e8734a" stop-opacity="0.14"/>
    <stop offset="100%" stop-color="#e8734a" stop-opacity="0"/>
  </radialGradient>
  <filter id="soft">
    <feGaussianBlur stdDeviation="22"/>
  </filter>
  <marker id="arr3" markerWidth="7" markerHeight="7" refX="5" refY="2.5" orient="auto">
    <path d="M0,0 L0,5 L7,2.5 z" fill="#e8734a" opacity="0.5"/>
  </marker>
</defs>

<!-- Background -->
<rect width="1200" height="675" fill="url(#bg3)"/>

<!-- Ambient glow -->
<ellipse cx="600" cy="338" rx="400" ry="220" fill="url(#glow3)" filter="url(#soft)"/>

<!-- ── LAYER LABELS ── -->
<!-- Layer headers -->
<text x="130" y="110" font-family="Courier New,monospace" font-size="8" fill="#e8734a" opacity="0.5" text-anchor="middle" letter-spacing="2">ATOMS</text>
<text x="130" y="124" font-family="Courier New,monospace" font-size="7" fill="#f0e6d3" opacity="0.2" text-anchor="middle">12 elements</text>

<text x="390" y="110" font-family="Courier New,monospace" font-size="8" fill="#e8734a" opacity="0.45" text-anchor="middle" letter-spacing="2">MOLECULES</text>
<text x="390" y="124" font-family="Courier New,monospace" font-size="7" fill="#f0e6d3" opacity="0.2" text-anchor="middle">23 components</text>

<text x="690" y="110" font-family="Courier New,monospace" font-size="8" fill="#e8734a" opacity="0.4" text-anchor="middle" letter-spacing="2">ORGANISMS</text>
<text x="690" y="124" font-family="Courier New,monospace" font-size="7" fill="#f0e6d3" opacity="0.2" text-anchor="middle">9 patterns</text>

<text x="970" y="110" font-family="Courier New,monospace" font-size="8" fill="#e8734a" opacity="0.35" text-anchor="middle" letter-spacing="2">TEMPLATES</text>
<text x="970" y="124" font-family="Courier New,monospace" font-size="7" fill="#f0e6d3" opacity="0.2" text-anchor="middle">5 layouts</text>

