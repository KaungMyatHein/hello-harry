<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
<defs>
  <radialGradient id="bg2" cx="50%" cy="60%" r="70%">
    <stop offset="0%" stop-color="#1e1810"/>
    <stop offset="55%" stop-color="#141210"/>
    <stop offset="100%" stop-color="#0d0b09"/>
  </radialGradient>
  <radialGradient id="glowC" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#c8a96e" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#c8a96e" stop-opacity="0"/>
  </radialGradient>
  <filter id="blur1">
    <feGaussianBlur stdDeviation="28"/>
  </filter>
  <marker id="arrowO2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#c8a96e" opacity="0.7"/>
